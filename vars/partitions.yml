      - { name: data-bond2-port1,  pchid: "10c", port: 1, vlan_id: "", description: "data-bond2-port1" }
      - { name: data-bond2-port2,  pchid: "1ec", port: 1, vlan_id: "", description: "data-bond2-port2" }

    storage:
      group_name:        "l1testw4-OS"
      group_description: "FCP SG for l1testw4-OS"
      connectivity:      4                  # 2 WWPNs (multipath)
      max_partitions: 1
      boot_volume:
        name:        "vol-boot-l1testw4-KVM"
        description: "Boot disk"
        size:        300                     # GB
      data_volumes:
        - { name: "vol-libvirt01-01", size: 120, description: "kvm-libvirt" }
        - { name: "vol-vgextra01-02", size: 120, description: "kvm-vgextra" }

