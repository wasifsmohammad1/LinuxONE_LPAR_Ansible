      - { name: mgmt-bond1-port2,  pchid: "1ec", port: 1, vlan_id: "", device_number: "0700", description: "mgmt-bond1-port2" }
      - { name: data-bond2-port1,  pchid: "10c", port: 1, vlan_id: "", device_number: "0100", description: "data-bond2-port1" }
      - { name: data-bond2-port2,  pchid: "1ec", port: 1, vlan_id: "", device_number: "0200", description: "data-bond2-port2" }

