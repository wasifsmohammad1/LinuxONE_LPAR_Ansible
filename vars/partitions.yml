---
# =============================================================================
# Multiple-LPAR specification.
#
# Add / remove / reorder entries here — the main playbook iterates over this
# list and provisions each partition end-to-end (partition → NICs → SG → boot
# volume → data volumes → attach → readback WWPNs).
#
# Each entry is fully self-contained — different partitions can have totally
# different sizes, PCHID lists, and storage layouts.
# =============================================================================

# Stop on first failure?  Set to false to keep going on the remaining
# partitions if one fails (useful for batch ops where a single bad PCHID
# shouldn't block the rest).
fail_fast: true

# How many seconds to pause between partition creates (gives HMC API time to
# settle so back-to-back creates don't trip the rate limiter).
inter_partition_pause: 5

partitions:

  # ---------------------------------------------------------------------------
  # 1) Production application partition — high IFL/RAM, dual-FCP-path storage
  # ---------------------------------------------------------------------------
  - name: l1testw1 
    description: "l1testw1"
    type: linux
    processor_mode: shared
    ifl_processors: 1
    initial_memory: 4096
    maximum_memory: 32768
    autostart: false

    network_adapters:
      - { name: mgmt-bond1-port1,  pchid: "10c", port: 1, vlan_id: "", description: "mgmt-bond1-port1" }
      - { name: mgmt-bond1-port2,  pchid: "1ec", port: 1, vlan_id: "", description: "mgmt-bond1-port2" }
      - { name: data-bond2-port1,  pchid: "10c", port: 1, vlan_id: "", description: "data-bond2-port1" }
      - { name: data-bond2-port2,  pchid: "1ec", port: 1, vlan_id: "", description: "data-bond2-port2" }

    storage:
      group_name:        "l1testw1-OS"
      group_description: "FCP SG for l1testw1-OS"
      connectivity:      4                  # 2 WWPNs (multipath)
      max-partitions: 1
      boot_volume:
        name:        "vol-boot-l1testw1-KVM"
        description: "Boot disk"
        size:        300                     # GB
      data_volumes:
        - { name: "vol-libvirt01-01", size: 120, description: "kvm-libvirt" }
        - { name: "vol-vgextra01-02", size: 120, description: "kvm-vgextra" }

  # ---------------------------------------------------------------------------
  # 2) Production application partition — second tenant
  # ---------------------------------------------------------------------------
  - name: l1testw2
    description: "l1testw2"
    type: linux
    processor_mode: shared
    ifl_processors: 1
    initial_memory: 4096 
    maximum_memory: 32768
    autostart: false

    network_adapters:
      - { name: mgmt-bond1-port1,  pchid: "10c", port: 1, vlan_id: "", description: "mgmt-bond1-port1" }
      - { name: mgmt-bond1-port2,  pchid: "1ec", port: 1, vlan_id: "", description: "mgmt-bond1-port2" }
      - { name: data-bond2-port1,  pchid: "10c", port: 1, vlan_id: "", description: "data-bond2-port1" }
      - { name: data-bond2-port2,  pchid: "1ec", port: 1, vlan_id: "", description: "data-bond2-port2" }
      
    storage:
      group_name:        "l1testw2-OS"
      group_description: "FCP SG for l1testw2-OS"
      connectivity:      4                  # 2 WWPNs (multipath)
      max-partitions: 1
      boot_volume:
        name:        "vol-boot-l1testw2-KVM"
        description: "Boot disk"
        size:        300                     # GB
      data_volumes:
        - { name: "vol-libvirt01-01", size: 120, description: "kvm-libvirt" }
        - { name: "vol-vgextra01-02", size: 120, description: "kvm-vgextra" }

  # ---------------------------------------------------------------------------
  # 3) Database partition — bigger memory, 4 FCP paths for throughput
  # ---------------------------------------------------------------------------
  - name: l1testw3
    description: "l1testw3"
    type: linux
    processor_mode: shared
    ifl_processors: 1
    initial_memory: 4096
    maximum_memory: 32768
    autostart: false

    network_adapters:
      - { name: mgmt-bond1-port1,  pchid: "10c", port: 1, vlan_id: "", description: "mgmt-bond1-port1" }
      - { name: mgmt-bond1-port2,  pchid: "1ec", port: 1, vlan_id: "", description: "mgmt-bond1-port2" }
      - { name: data-bond2-port1,  pchid: "10c", port: 1, vlan_id: "", description: "data-bond2-port1" }
      - { name: data-bond2-port2,  pchid: "1ec", port: 1, vlan_id: "", description: "data-bond2-port2" }

    storage:
      group_name:        "l1testw3-OS"
      group_description: "FCP SG for l1testw3-OS"
      connectivity:      4                  # 2 WWPNs (multipath)
      max-partitions: 1
      boot_volume:
        name:        "vol-boot-l1testw3-KVM"
        description: "Boot disk"
        size:        300                     # GB
      data_volumes:
        - { name: "vol-libvirt01-01", size: 120, description: "kvm-libvirt" }
        - { name: "vol-vgextra01-02", size: 120, description: "kvm-vgextra" }

  # ---------------------------------------------------------------------------
  # 4) Dev/test partition — small footprint, one FCP path
  # ---------------------------------------------------------------------------
  - name: l1testw4
    description: "l1testw4"
    type: linux
    processor_mode: shared
    ifl_processors: 1
    initial_memory: 4096
    maximum_memory: 32768
