---
# =============================================================================
# COMPACT input file for the storage-group generator.
#
# Edit this file (it's much shorter than the expanded vars/storage_groups.yml),
# then run:
#
#     ansible-playbook -i inventory.yml generate-storage-groups-vars.yml
#
# That writes the fully-expanded vars/storage_groups.yml — at which point the
# normal provisioner consumes it:
#
#     ansible-playbook -i inventory.yml provision-storage-groups.yml \
#         --ask-vault-pass --forks 4
#
# Why volume_sets?
# ----------------
# Instead of writing 40 lines of `- { name: vol-foo-OS01, size: 300, ... }`,
# you say:
#     volume_sets:
#       - { prefix: "vol-foo-OS", count: 20, size: 300, pad: 2, start: 1 }
# and the generator expands it to vol-foo-OS01..OS20.
#
# Field reference (per SG entry):
#   name              required   storage group name (unique per CPC)
#   partition         required   target partition (must exist before provision)
#   description       optional   "" → auto-generated by the provisioner
#   type              optional   default 'fcp'
#   shared            optional   default false
#   connectivity      optional   default 2 paths
#   max_partitions    optional   default 1
#   boot_volume       optional   { name, size, description } — omit if data-only
#   volume_sets       optional   list of compact specs, each EXPANDS to N volumes:
#       prefix        required   name prefix
#       count         required   how many volumes to produce
#       size          required   GB per volume
#       pad           optional   zero-pad width for the index (default 2 → 01..99)
#       start         optional   first index (default 1)
#       description   optional   description for every volume in this set
#   data_volumes      optional   explicit volumes (merged with volume_sets if both)
# =============================================================================

fail_fast: true

storage_groups:

  # ---------------------------------------------------------------------------
  # Example 1 — l1testw1-VM:  20 OS-volumes (300GB), 20 Log-volumes (300GB),
  # and 4 VGEXTRA volumes (120GB). Same shape as the screenshot, but written
  # in 3 lines instead of 44.
  # ---------------------------------------------------------------------------
  - name:           "l1testw1-VM"
    partition:      "l1testw1"
    description:    ""                    # auto-generated
    type:           fcp
    shared:         false
    connectivity:   4
    max_partitions: 1
    volume_sets:
      - { prefix: "vol-l1testw1-VM-OS",      count: 20, size: 300, pad: 2, start: 1, description: "OS volume" }
      - { prefix: "vol-l1testw1-VM-LOGs",    count: 20, size: 300, pad: 2, start: 1, description: "Log volume" }
      - { prefix: "vol-l1testw1-VM-VGEXTRA", count: 4,  size: 120, pad: 2, start: 1, description: "VG extra" }

  # ---------------------------------------------------------------------------
  # Example 2 — l1testw2 DB SG with explicit boot volume + a small data set.
  # Mixed: a boot_volume + a single volume_set + an explicit data_volume entry.
  # ---------------------------------------------------------------------------
  - name:           "l1testw2-db-SG"
    partition:      "l1testw2"
    description:    "Database storage for l1testw2"
    connectivity:   4
    boot_volume:
      name:        "vol-l1testw2-db-boot"
      size:        100
      description: "DB boot disk"
    volume_sets:
      - { prefix: "vol-l1testw2-pgdata-", count: 8, size: 250, pad: 2, start: 1, description: "PG data shard" }
    data_volumes:
      - { name: "vol-l1testw2-pgwal", size: 100, description: "WAL" }

  # ---------------------------------------------------------------------------
  # Example 3 — quick archive SG using just one volume_set
  # ---------------------------------------------------------------------------
  - name:           "l1testw3-archive-SG"
    partition:      "l1testw3"
    description:    ""
    connectivity:   2
    volume_sets:
      - { prefix: "vol-l1testw3-arch-", count: 10, size: 1000, pad: 3, start: 1, description: "archive volume" }

  # ---------------------------------------------------------------------------
  # Example 4 — fully manual (no volume_sets, just data_volumes). Still works.
  # ---------------------------------------------------------------------------
  - name:           "l1testw4-backup-SG"
    partition:      "l1testw4"
    description:    "Backup target"
    connectivity:   2
    data_volumes:
      - { name: "vol-l1testw4-bkp-01", size: 500, description: "weekly fulls" }
      - { name: "vol-l1testw4-bkp-02", size: 500, description: "daily incrementals" }
