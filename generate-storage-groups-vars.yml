---
# =============================================================================
# Generate vars/storage_groups.yml from the COMPACT vars/storage_groups_input.yml.
#
# The compact file lets you say "20 OS volumes of 300GB" in one line via
# `volume_sets`. This generator expands every volume_set into the explicit
# data_volumes list the provisioner expects, then writes a clean, ready-to-run
# vars/storage_groups.yml.
#
# Pipeline:
#   1. Edit  vars/storage_groups_input.yml   (compact form)
#   2. Run   ansible-playbook -i inventory.yml generate-storage-groups-vars.yml
#   3. Review ./vars/storage_groups.yml      (expanded form)
#   4. Run   ansible-playbook -i inventory.yml provision-storage-groups.yml \
#                --ask-vault-pass --forks 4
#
# Behavior notes
# --------------
# * Each volume_set produces N volumes named "<prefix><index>" where <index>
#   is zero-padded to `pad` digits, starting at `start` (default 1).
# * If both `volume_sets` and `data_volumes` are defined on an SG, the
#   generator concatenates them: expanded sets first, then explicit entries.
# * The output file is overwritten on every run; the input file is never
#   touched.
#
# Optional flags:
#   -e output=vars/storage_groups.yml          (default; change to write elsewhere)
#   -e input=vars/storage_groups_input.yml     (default)
# =============================================================================

- name: Expand vars/storage_groups_input.yml → vars/storage_groups.yml
  hosts: localhost
  gather_facts: false

  vars:
    input:  "vars/storage_groups_input.yml"
    output: "vars/storage_groups.yml"

  tasks:

    - name: Read the compact input file
      ansible.builtin.include_vars:
        file: "{{ input }}"
        name: input_data

    - name: Sanity — input has a storage_groups list
      ansible.builtin.assert:
        that:
          - input_data.storage_groups is defined
          - (input_data.storage_groups | length) > 0
        fail_msg: "{{ input }} must define a non-empty `storage_groups:` list."

    - name: Initialize accumulator
      ansible.builtin.set_fact:
        expanded_sgs: []

    # Expand each SG one at a time. The per-SG include builds the explicit
    # data_volumes list from volume_sets + any pre-existing data_volumes,
    # then appends the cleaned SG to expanded_sgs.
    - name: Expand each SG (volume_sets → data_volumes)
      ansible.builtin.include_tasks: tasks/_expand-one-storage-group.yml
      vars:
        sg: "{{ this_sg }}"
      loop: "{{ input_data.storage_groups }}"
      loop_control:
        loop_var: this_sg
        label: "{{ this_sg.name }}"

    # -------------------------------------------------------------------------
    # Cross-SG validation
    # -------------------------------------------------------------------------
    - name: All SG names unique
      ansible.builtin.assert:
        that: >
          (expanded_sgs | map(attribute='name') | list | length)
          == (expanded_sgs | map(attribute='name') | list | unique | list | length)
        fail_msg: >
          Duplicate SG name in {{ input }}. SG names must be unique per CPC.
          Names: {{ expanded_sgs | map(attribute='name') | list }}

    - name: All data_volume names unique within each SG
      ansible.builtin.assert:
        that:
          - (item.data_volumes | default([]) | map(attribute='name') | list | length)
            == (item.data_volumes | default([]) | map(attribute='name') | list | unique | list | length)
        fail_msg: >
          SG '{{ item.name }}' has duplicate volume names after expansion —
          probably a volume_set with overlapping prefix+index range. Volumes:
          {{ item.data_volumes | default([]) | map(attribute='name') | list }}
        quiet: true
      loop: "{{ expanded_sgs }}"
      loop_control:
        label: "{{ item.name }}"

    # -------------------------------------------------------------------------
    # Write the expanded vars/storage_groups.yml
    # -------------------------------------------------------------------------
    - name: Render expanded vars file
      ansible.builtin.copy:
        dest: "{{ output }}"
        mode: "0644"
        content: |
          ---
          # =============================================================================
          # AUTO-GENERATED by generate-storage-groups-vars.yml from {{ input }}
          # Generated : {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
          # Edit the COMPACT input ({{ input }}) and re-run the generator —
          # editing this file directly will be overwritten on the next run.
          # =============================================================================

          fail_fast: {{ input_data.fail_fast | default(true) | bool }}

          storage_groups:
          {% for sg in expanded_sgs %}
            - name:           {{ sg.name | to_json }}
              partition:      {{ sg.partition | to_json }}
              description:    {{ (sg.description | default('')) | to_json }}
              type:           {{ (sg.type   | default('fcp')) }}
              shared:         {{ (sg.shared | default(false)) | bool }}
              connectivity:   {{ sg.connectivity   | default(2) }}
              max_partitions: {{ sg.max_partitions | default(1) }}
          {% if sg.boot_volume is defined and (sg.boot_volume.name | default('') | length) > 0 %}
              boot_volume:
                name:        {{ sg.boot_volume.name | to_json }}
                size:        {{ sg.boot_volume.size }}
                description: {{ (sg.boot_volume.description | default('Boot disk')) | to_json }}
          {% endif %}
              data_volumes:
          {% for v in sg.data_volumes | default([]) %}
                - { name: {{ v.name | to_json }}, size: {{ v.size }}, description: {{ (v.description | default('')) | to_json }} }
          {% endfor %}

          {% endfor %}

    - name: Summary
      ansible.builtin.debug:
        msg: |
          ================================================================
          GENERATED  {{ output }}
          ================================================================
          {% for sg in expanded_sgs %}
            {{ sg.name }}  →  {{ sg.partition }}  ({{ sg.data_volumes | default([]) | length }} data vol(s){% if sg.boot_volume is defined and (sg.boot_volume.name | default('') | length) > 0 %} + 1 boot{% endif %})
          {% endfor %}
          ================================================================
          Next:
              ansible-playbook -i inventory.yml provision-storage-groups.yml \
                  --ask-vault-pass --forks 4
