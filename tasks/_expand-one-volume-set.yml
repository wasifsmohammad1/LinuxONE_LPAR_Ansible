---
# =============================================================================
# Expand ONE volume_set into individual volume dicts and append them to
# `_vols_from_sets`. Included from _expand-one-storage-group.yml.
#
# Inputs:
#   sg              — the parent SG spec (used only for log labels)
#   vset            — one entry from sg.volume_sets:
#                       prefix      (required)
#                       count       (required)
#                       size        (required, GB)
#                       pad         (optional, default 2)
#                       start       (optional, default 1)
#                       description (optional)
#   _vols_from_sets — accumulator (list of dicts), updated in place
#
# Naming: "<prefix><index>" where <index> is zero-padded to `pad` digits,
# starting at `start`. e.g. prefix="vol-foo-OS", count=20, pad=2, start=1
# → vol-foo-OS01 .. vol-foo-OS20.
# =============================================================================

- name: "[{{ sg.name }} :: {{ vset.prefix }}] Append one volume"
  ansible.builtin.set_fact:
    _vols_from_sets: >-
      {{ _vols_from_sets + [{
           'name':        vset.prefix ~ ('%0*d' | format((vset.pad | default(2) | int), idx)),
           'size':        vset.size,
           'description': vset.description | default('')
         }] }}
  loop: "{{ range(vset.start | default(1) | int,
                  (vset.start | default(1) | int) + (vset.count | int)) | list }}"
  loop_control:
    loop_var: idx
    label: "{{ vset.prefix }}{{ '%0*d' | format((vset.pad | default(2) | int), idx) }}"
